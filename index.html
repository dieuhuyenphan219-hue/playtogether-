# playtogether-
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hành Trình Play Together của Pi</title>
    <style>
        :root { --primary: #ffde59; --bg: #f0f8ff; --accent: #ff914d; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; text-align: center; }
        header { background: var(--primary); padding: 30px; border-bottom: 5px solid var(--accent); }
        .container { max-width: 800px; margin: 20px auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1, h2 { color: var(--accent); }
        .stats { display: flex; justify-content: space-around; background: var(--accent); color: white; padding: 15px; border-radius: 15px; }
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .photo { background: #eee; height: 150px; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 2px dashed #ccc; color: #888; }
        footer { padding: 20px; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>
    <header>
        <h1>HÀNH TRÌNH PLAY TOGETHER</h1>
        <p>Chào mừng đến với thế giới của <strong>Pi</strong> 🏝️</p>
    </header>
    <div class="container">
        <div class="card">
            <h2>📍 Giới thiệu</h2>
            <p>Đây là nơi mình lưu giữ kỷ niệm tại Đảo Kaia.</p>
            <div class="stats">
                <div>🐟 Cá hiếm: 50+</div>
                <div>🏠 Nhà: Luxury</div>
            </div>
        </div>
        <div class="card">
            <h2>📸 Nhật ký hình ảnh</h2>
            <div class="gallery">
                <div class="photo">Ảnh Party</div>
                <div class="photo">Ảnh Câu Cá</div>
            </div>
        </div>
    </div>
    <footer>Thiết kế bởi Pi © 2026</footer>
</body>
</html>
